name: Generate and Deploy Javadoc

on:
    push:
        branches:
            - stable #Solo se dispara con cambios a stable

concurrency:
    group: "pages"
    cancel-in-progress: false

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build-docs:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Cache Maven dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

            - name: Resolve classpath
              run: mvn dependency:build-classpath "-Dmdep.outputFile=cp.txt"

            - name: Generate Javadoc
              run: |
                  javadoc -d docs/javadoc \
                  -sourcepath src/main/java \
                  -subpackages com.tt1.test \
                  -classpath $(cat cp.txt) \
                  -author -version -charset UTF-8 \
                  -windowtitle "Task Service API Reference"

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/javadoc

    deploy:
        needs: build-docs
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4